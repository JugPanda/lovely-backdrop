<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lovely — Ambient Backdrop</title>
  <style>
    :root {
      --bg-deep: #090a14;
      --bg-mid: #121427;
      --ink: rgba(240, 241, 255, 0.82);
      --muted: rgba(218, 220, 244, 0.52);
      --glow-a: rgba(112, 97, 164, 0.16);
      --glow-b: rgba(58, 82, 138, 0.18);
      --glow-c: rgba(164, 115, 151, 0.11);
      --halo: rgba(255, 245, 223, 0.055);
      --vignette: rgba(3, 4, 10, 0.56);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 20% 30%, rgba(95, 88, 145, 0.12), transparent 36%),
        radial-gradient(circle at 74% 26%, rgba(83, 100, 158, 0.11), transparent 34%),
        radial-gradient(circle at 50% 74%, rgba(157, 110, 142, 0.08), transparent 40%),
        linear-gradient(180deg, #0c0d18 0%, #090a14 44%, #0a0b16 100%);
    }

    .video-wrap,
    .bg-video,
    canvas,
    .mist,
    .vignette,
    .grain,
    .content-wrap {
      position: absolute;
      inset: 0;
    }

    .video-wrap {
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 244, 225, 0.06), transparent 32%),
        linear-gradient(180deg, rgba(7, 8, 14, 0.16), rgba(7, 8, 14, 0.42) 58%, rgba(5, 6, 12, 0.72));
    }

    .bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.04);
      filter: blur(4px) saturate(0.62) brightness(0.68) contrast(1.02) sepia(0.04) hue-rotate(194deg);
      opacity: var(--video-opacity, 0);
      mix-blend-mode: screen;
      transition: opacity 120ms linear;
    }

    #lights {
      width: 100%;
      height: 100%;
      display: block;
      filter: blur(0.15px);
      opacity: 0.26;
    }

    .mist {
      background:
        radial-gradient(40vw 30vw at 18% 48%, rgba(120, 104, 173, 0.08), transparent 70%),
        radial-gradient(34vw 28vw at 76% 60%, rgba(82, 102, 167, 0.08), transparent 72%),
        radial-gradient(42vw 32vw at 54% 18%, rgba(180, 137, 156, 0.06), transparent 72%);
      mix-blend-mode: screen;
      filter: blur(34px);
      opacity: 0.28;
      animation: breathe 18s ease-in-out infinite alternate;
      transform-origin: center;
    }

    .grain {
      opacity: 0.045;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 4px 4px, 4px 4px;
      mix-blend-mode: soft-light;
      transform: scale(1.02);
    }

    .vignette {
      background:
        radial-gradient(circle at center, transparent 0 38%, rgba(8, 8, 18, 0.15) 60%, rgba(4, 5, 11, 0.58) 100%),
        linear-gradient(180deg, rgba(7, 7, 15, 0.24), rgba(7, 7, 15, 0.22) 32%, rgba(4, 5, 11, 0.44));
      pointer-events: none;
    }

    .tone {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 72%, rgba(255, 235, 210, 0.04), transparent 22%),
        radial-gradient(circle at 22% 24%, rgba(110, 92, 164, 0.12), transparent 36%),
        radial-gradient(circle at 82% 30%, rgba(63, 89, 158, 0.13), transparent 34%),
        linear-gradient(180deg, rgba(10, 12, 25, 0.24), rgba(8, 9, 18, 0.42) 52%, rgba(8, 9, 18, 0.62));
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .content-wrap {
      display: grid;
      place-items: center;
      padding: 8vmin;
      pointer-events: none;
    }

    .content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      transform: translateY(16px);
      opacity: 0.32;
      animation: fadeIn 4.5s ease-out 0.8s forwards, drift 14s ease-in-out 5.3s infinite alternate;
      max-width: min(90vw, 900px);
    }

    .name {
      margin: 0;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: clamp(2.3rem, 5vw, 5.2rem);
      line-height: 1.08;
      color: rgba(245, 245, 255, 0.82);
      text-shadow: 0 0 18px rgba(188, 183, 237, 0.06), 0 0 38px rgba(142, 144, 201, 0.05);
    }

    .line {
      margin: 0;
      font-family: "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      font-weight: 300;
      letter-spacing: 0.23em;
      text-transform: uppercase;
      font-size: clamp(0.8rem, 1.4vw, 1.05rem);
      color: var(--muted);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.8s ease, transform 1.8s ease;
    }

    .line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .line::before,
    .line::after {
      content: "";
      display: inline-block;
      width: min(10vw, 80px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(226, 228, 249, 0.25), transparent);
      vertical-align: middle;
      margin: 0 0.95rem;
      transform: translateY(-0.08rem);
    }

    .hint {
      position: absolute;
      right: 18px;
      bottom: 12px;
      font-family: "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: rgba(220, 223, 245, 0.22);
      opacity: 0;
      animation: revealHint 2s ease 7s forwards;
      user-select: none;
    }

    .hint.needs-start {
      opacity: 1;
      animation: none;
      color: rgba(230, 233, 247, 0.58);
    }

    .sound-toggle {
      position: absolute;
      left: 18px;
      bottom: 14px;
      z-index: 5;
      padding: 0.7rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(226, 229, 248, 0.18);
      background: rgba(13, 15, 29, 0.36);
      color: rgba(238, 240, 252, 0.82);
      font-family: "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .sound-toggle:hover,
    .sound-toggle:focus-visible {
      outline: none;
      transform: translateY(-1px);
      background: rgba(17, 20, 38, 0.5);
      border-color: rgba(232, 235, 251, 0.3);
      color: rgba(245, 246, 255, 0.95);
    }

    .sound-toggle.is-live {
      background: rgba(33, 38, 68, 0.5);
      border-color: rgba(204, 210, 243, 0.34);
      color: rgba(246, 247, 255, 0.96);
    }

    @keyframes breathe {
      0% {
        transform: scale(1) translate3d(0, 0, 0);
        opacity: 0.62;
      }
      100% {
        transform: scale(1.08) translate3d(1.5%, -1%, 0);
        opacity: 0.84;
      }
    }

    @keyframes fadeIn {
      0% {
        opacity: 0.32;
        transform: translateY(24px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drift {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-8px) scale(1.004); }
    }

    @keyframes revealHint {
      to { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-video,
      .mist,
      .content,
      .hint {
        animation: none !important;
      }

      .bg-video {
        transform: scale(1.08);
      }

      .content {
        opacity: 1;
        transform: none;
      }
    }

    @media (max-width: 640px) {
      .content {
        gap: 0.75rem;
      }

      .line {
        letter-spacing: 0.18em;
      }

      .line::before,
      .line::after {
        width: 42px;
        margin: 0 0.6rem;
      }

      .hint {
        display: none;
      }

      .sound-toggle {
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        min-width: 150px;
      }

      .sound-toggle:hover,
      .sound-toggle:focus-visible {
        transform: translateX(-50%) translateY(-1px);
      }
    }
  </style>
</head>
<body>
  <div class="video-wrap" aria-hidden="true">
    <video
      class="bg-video"
      id="bgVideoA"
      autoplay
      playsinline
      preload="auto"
      poster="preview-frame.jpg"
    >
      <source src="lovely-performance-bg.mp4" type="video/mp4" />
    </video>
    <video
      class="bg-video"
      id="bgVideoB"
      autoplay
      playsinline
      preload="auto"
      poster="preview-frame.jpg"
    >
      <source src="lovely-performance-bg.mp4" type="video/mp4" />
    </video>
  </div>
  <canvas id="lights" aria-hidden="true"></canvas>
  <div class="tone" aria-hidden="true"></div>
  <div class="mist" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <div class="content-wrap">
    <div class="content">
      <h1 class="name" id="recipientName">Favor</h1>
      <p class="line" id="dedication">&ldquo;Lovely&rdquo; &mdash; Billie Ellish</p>
    </div>
  </div>

  <div class="hint">Autoplaying muted • use Unmute for sound</div>
  <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="false" aria-label="Unmute audio">Unmute</button>

  <script>
    const RECIPIENT_NAME = 'Favor';
    const dedicationText = '“Lovely” — Billie Ellish';
    const DEDICATION_DELAY_MS = 180000;
    const videoA = document.getElementById('bgVideoA');
    const videoB = document.getElementById('bgVideoB');
    const videos = [videoA, videoB];
    const hint = document.querySelector('.hint');
    const soundToggle = document.getElementById('soundToggle');
    const dedicationEl = document.getElementById('dedication');
    const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    const CROSSFADE_SECONDS = 2.4;
    const VIDEO_MAX_OPACITY = 0.62;
    let activeVideo = videoA;
    let standbyVideo = videoB;
    let monitorHandle = null;
    let crossfadeRunning = false;
    let playbackStarted = false;
    let audioEnabled = false;
    let dedicationTimer = null;
    let dedicationShown = false;

    document.getElementById('recipientName').textContent = RECIPIENT_NAME;
    dedicationEl.textContent = dedicationText;

    function revealDedication() {
      dedicationShown = true;
      dedicationEl.classList.add('visible');
    }

    function resetDedicationTimer() {
      if (dedicationTimer) {
        clearTimeout(dedicationTimer);
      }
      if (dedicationShown) return;
      dedicationTimer = window.setTimeout(revealDedication, DEDICATION_DELAY_MS);
    }

    function updateSoundUi() {
      soundToggle.textContent = audioEnabled ? 'Mute' : 'Unmute';
      soundToggle.setAttribute('aria-pressed', String(audioEnabled));
      soundToggle.setAttribute('aria-label', audioEnabled ? 'Mute audio' : 'Unmute audio');
      soundToggle.classList.toggle('is-live', audioEnabled);
    }

    function applyAudioState() {
      videos.forEach((videoEl) => {
        videoEl.muted = !audioEnabled;
      });
      updateSoundUi();
    }

    function setLayerOpacity(videoEl, alpha) {
      videoEl.style.setProperty('--video-opacity', String(VIDEO_MAX_OPACITY * alpha));
    }

    function resetVideoState(videoEl, { volume = 0, opacity = 0, pause = true } = {}) {
      if (pause) {
        videoEl.pause();
      }
      videoEl.currentTime = 0;
      videoEl.muted = !audioEnabled;
      videoEl.volume = volume;
      setLayerOpacity(videoEl, opacity);
    }

    videos.forEach((videoEl, index) => {
      videoEl.loop = false;
      videoEl.muted = !audioEnabled;
      videoEl.volume = index === 0 ? 1 : 0;
      setLayerOpacity(videoEl, index === 0 ? 1 : 0);
    });

    applyAudioState();
    resetVideoState(videoB);

    function stopLoopMonitor() {
      if (monitorHandle) {
        cancelAnimationFrame(monitorHandle);
        monitorHandle = null;
      }
    }

    async function beginCrossfade() {
      if (crossfadeRunning || reducedMotionQuery.matches) return;
      crossfadeRunning = true;

      resetVideoState(standbyVideo, { volume: 0, opacity: 0, pause: false });

      try {
        await standbyVideo.play();
      } catch (error) {
        crossfadeRunning = false;
        hint.classList.add('needs-start');
        hint.textContent = 'Tap anywhere to begin the video • use Unmute for sound';
        return;
      }

      const startedAt = performance.now();

      function step(now) {
        const progress = Math.min((now - startedAt) / (CROSSFADE_SECONDS * 1000), 1);
        activeVideo.volume = 1 - progress;
        standbyVideo.volume = progress;
        setLayerOpacity(activeVideo, 1 - progress);
        setLayerOpacity(standbyVideo, progress);

        if (progress < 1) {
          requestAnimationFrame(step);
          return;
        }

        activeVideo.pause();
        activeVideo.currentTime = 0;
        activeVideo.volume = 0;
        setLayerOpacity(activeVideo, 0);

        const previousActive = activeVideo;
        activeVideo = standbyVideo;
        standbyVideo = previousActive;
        crossfadeRunning = false;
      }

      requestAnimationFrame(step);
    }

    function monitorLoop() {
      if (!playbackStarted || reducedMotionQuery.matches) return;

      if (
        !crossfadeRunning &&
        Number.isFinite(activeVideo.duration) &&
        activeVideo.duration - activeVideo.currentTime <= CROSSFADE_SECONDS + 0.08
      ) {
        beginCrossfade();
      }

      monitorHandle = requestAnimationFrame(monitorLoop);
    }

    async function attemptPlayback() {
      try {
        await activeVideo.play();
        playbackStarted = true;
        resetDedicationTimer();
        stopLoopMonitor();
        monitorLoop();
        hint.classList.remove('needs-start');
        hint.textContent = audioEnabled ? 'Press F11 for fullscreen' : 'Autoplaying muted • use Unmute for sound';
        return true;
      } catch (error) {
        hint.classList.add('needs-start');
        hint.textContent = 'Tap anywhere to begin the video • use Unmute for sound';
        return false;
      }
    }

    function syncReducedMotionPreference() {
      if (reducedMotionQuery.matches) {
        stopLoopMonitor();
        crossfadeRunning = false;
        playbackStarted = false;
        activeVideo = videoA;
        standbyVideo = videoB;
        resetVideoState(videoA, { volume: 0, opacity: 1, pause: true });
        resetVideoState(videoB, { volume: 0, opacity: 0, pause: true });
        videoA.removeAttribute('autoplay');
        videoB.removeAttribute('autoplay');
        hint.classList.remove('needs-start');
        hint.textContent = 'Autoplay paused for reduced motion';
      } else {
        videoA.setAttribute('autoplay', 'autoplay');
        videoB.setAttribute('autoplay', 'autoplay');
        resetVideoState(activeVideo, { volume: 1, opacity: 1, pause: false });
        resetVideoState(standbyVideo, { volume: 0, opacity: 0, pause: true });
        applyAudioState();
        attemptPlayback();
      }
    }

    syncReducedMotionPreference();
    reducedMotionQuery.addEventListener('change', syncReducedMotionPreference);

    soundToggle.addEventListener('click', async (event) => {
      event.stopPropagation();
      audioEnabled = !audioEnabled;
      applyAudioState();
      if (!reducedMotionQuery.matches && !playbackStarted) {
        await attemptPlayback();
      } else if (!hint.classList.contains('needs-start')) {
        hint.textContent = audioEnabled ? 'Press F11 for fullscreen' : 'Autoplaying muted • use Unmute for sound';
      }
    });

    document.addEventListener('pointerdown', () => {
      if (!reducedMotionQuery.matches && (activeVideo.paused || hint.classList.contains('needs-start'))) {
        attemptPlayback();
      }
    }, { passive: true });

    const canvas = document.getElementById('lights');
    const ctx = canvas.getContext('2d');
    let width = 0;
    let height = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let blooms = [];
    const reducedMotion = reducedMotionQuery.matches;

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function makeBloom(seedX, seedY, scale = 1) {
      return {
        x: seedX ?? random(0.12, 0.88) * width,
        y: seedY ?? random(0.15, 0.85) * height,
        radius: random(110, 260) * scale,
        baseRadius: random(110, 260) * scale,
        alpha: random(0.04, 0.11),
        driftX: random(-0.035, 0.035),
        driftY: random(-0.018, 0.018),
        phase: random(0, Math.PI * 2),
        speed: random(0.00045, 0.0012),
        hue: Math.round(random(220, 318)),
        sat: random(16, 32),
        light: random(62, 78)
      };
    }

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.max(7, Math.min(14, Math.round(width / 170)));
      blooms = Array.from({ length: count }, (_, i) => {
        if (i === 0) return makeBloom(width * 0.28, height * 0.36, 1.2);
        if (i === 1) return makeBloom(width * 0.7, height * 0.58, 1.15);
        if (i === 2) return makeBloom(width * 0.52, height * 0.22, 0.95);
        return makeBloom();
      });
    }

    function drawBackground(time) {
      const t = time * 0.00008;
      const gradient = ctx.createRadialGradient(
        width * (0.48 + Math.sin(t * 0.8) * 0.02),
        height * (0.44 + Math.cos(t * 0.6) * 0.02),
        width * 0.05,
        width * 0.5,
        height * 0.5,
        Math.max(width, height) * 0.7
      );
      gradient.addColorStop(0, 'rgba(24, 22, 42, 0.22)');
      gradient.addColorStop(0.45, 'rgba(13, 15, 29, 0.14)');
      gradient.addColorStop(1, 'rgba(8, 9, 18, 0.88)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    function drawBloom(bloom, time, index) {
      const pulse = Math.sin(time * bloom.speed + bloom.phase);
      const sway = Math.cos(time * bloom.speed * 0.72 + bloom.phase * 0.8);
      const x = bloom.x + pulse * width * bloom.driftX;
      const y = bloom.y + sway * height * bloom.driftY;
      const radius = bloom.baseRadius * (1 + pulse * 0.055);
      const alpha = bloom.alpha * (0.8 + (pulse + 1) * 0.15);

      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, `hsla(${bloom.hue}, ${bloom.sat}%, ${bloom.light}%, ${alpha})`);
      gradient.addColorStop(0.38, `hsla(${bloom.hue}, ${bloom.sat}%, ${bloom.light - 4}%, ${alpha * 0.55})`);
      gradient.addColorStop(1, `hsla(${bloom.hue}, ${bloom.sat}%, ${bloom.light - 10}%, 0)`);

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      if (index % 3 === 0) {
        ctx.strokeStyle = `hsla(${bloom.hue}, ${Math.max(10, bloom.sat - 8)}%, ${bloom.light}%, ${alpha * 0.08})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x, y, radius * 0.68, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function render(time) {
      ctx.clearRect(0, 0, width, height);
      drawBackground(time);
      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < blooms.length; i += 1) {
        drawBloom(blooms[i], time, i);
      }
      ctx.globalCompositeOperation = 'source-over';

      if (!reducedMotion) {
        requestAnimationFrame(render);
      }
    }

    resize();
    if (reducedMotion) {
      render(0);
    } else {
      requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
  </script>
</body>
</html>
