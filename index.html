<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lovely — Ambient Backdrop</title>
  <style>
    :root {
      --bg-deep: #090a14;
      --bg-mid: #121427;
      --ink: rgba(240, 241, 255, 0.82);
      --muted: rgba(218, 220, 244, 0.52);
      --glow-a: rgba(112, 97, 164, 0.16);
      --glow-b: rgba(58, 82, 138, 0.18);
      --glow-c: rgba(164, 115, 151, 0.11);
      --halo: rgba(255, 245, 223, 0.055);
      --vignette: rgba(3, 4, 10, 0.56);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 20% 30%, rgba(95, 88, 145, 0.12), transparent 36%),
        radial-gradient(circle at 74% 26%, rgba(83, 100, 158, 0.11), transparent 34%),
        radial-gradient(circle at 50% 74%, rgba(157, 110, 142, 0.08), transparent 40%),
        linear-gradient(180deg, #0c0d18 0%, #090a14 44%, #0a0b16 100%);
    }

    canvas,
    .mist,
    .vignette,
    .grain,
    .content-wrap {
      position: absolute;
      inset: 0;
    }

    #lights {
      width: 100%;
      height: 100%;
      display: block;
      filter: blur(0.2px);
      opacity: 0.96;
    }

    .mist {
      background:
        radial-gradient(40vw 30vw at 18% 48%, rgba(120, 104, 173, 0.11), transparent 70%),
        radial-gradient(34vw 28vw at 76% 60%, rgba(82, 102, 167, 0.11), transparent 72%),
        radial-gradient(42vw 32vw at 54% 18%, rgba(180, 137, 156, 0.08), transparent 72%);
      mix-blend-mode: screen;
      filter: blur(42px);
      opacity: 0.72;
      animation: breathe 18s ease-in-out infinite alternate;
      transform-origin: center;
    }

    .grain {
      opacity: 0.06;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 4px 4px, 4px 4px;
      mix-blend-mode: soft-light;
      transform: scale(1.02);
    }

    .vignette {
      background:
        radial-gradient(circle at center, transparent 0 38%, rgba(8, 8, 18, 0.18) 62%, var(--vignette) 100%),
        linear-gradient(180deg, rgba(7, 7, 15, 0.3), rgba(7, 7, 15, 0.18) 32%, rgba(7, 7, 15, 0.34));
      pointer-events: none;
    }

    .content-wrap {
      display: grid;
      place-items: center;
      padding: 8vmin;
      pointer-events: none;
    }

    .content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      transform: translateY(16px);
      opacity: 0.32;
      animation: fadeIn 4.5s ease-out 0.8s forwards, drift 14s ease-in-out 5.3s infinite alternate;
      max-width: min(90vw, 900px);
    }

    .name {
      margin: 0;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: clamp(2.3rem, 5vw, 5.2rem);
      line-height: 1.08;
      color: rgba(245, 245, 255, 0.82);
      text-shadow: 0 0 18px rgba(188, 183, 237, 0.06), 0 0 38px rgba(142, 144, 201, 0.05);
    }

    .line {
      margin: 0;
      font-family: "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      font-weight: 300;
      letter-spacing: 0.23em;
      text-transform: uppercase;
      font-size: clamp(0.8rem, 1.4vw, 1.05rem);
      color: var(--muted);
    }

    .line::before,
    .line::after {
      content: "";
      display: inline-block;
      width: min(10vw, 80px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(226, 228, 249, 0.25), transparent);
      vertical-align: middle;
      margin: 0 0.95rem;
      transform: translateY(-0.08rem);
    }

    .hint {
      position: absolute;
      right: 18px;
      bottom: 12px;
      font-family: "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: rgba(220, 223, 245, 0.22);
      opacity: 0;
      animation: revealHint 2s ease 7s forwards;
      user-select: none;
    }

    @keyframes breathe {
      0% {
        transform: scale(1) translate3d(0, 0, 0);
        opacity: 0.62;
      }
      100% {
        transform: scale(1.08) translate3d(1.5%, -1%, 0);
        opacity: 0.84;
      }
    }

    @keyframes fadeIn {
      0% {
        opacity: 0.32;
        transform: translateY(24px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drift {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-8px) scale(1.004); }
    }

    @keyframes revealHint {
      to { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .mist,
      .content,
      .hint {
        animation: none !important;
      }

      .content {
        opacity: 1;
        transform: none;
      }
    }

    @media (max-width: 640px) {
      .content {
        gap: 0.75rem;
      }

      .line {
        letter-spacing: 0.18em;
      }

      .line::before,
      .line::after {
        width: 42px;
        margin: 0 0.6rem;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="lights" aria-hidden="true"></canvas>
  <div class="mist" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <div class="content-wrap">
    <div class="content">
      <h1 class="name" id="recipientName">[FILL IN NAME]</h1>
      <p class="line" id="dedication">&ldquo;Lovely&rdquo; &mdash; for you</p>
    </div>
  </div>

  <div class="hint">Press F11 for fullscreen</div>

  <script>
    const RECIPIENT_NAME = '[FILL IN NAME]';
    const dedicationText = '“Lovely” — for you';

    document.getElementById('recipientName').textContent = RECIPIENT_NAME;
    document.getElementById('dedication').textContent = dedicationText;

    const canvas = document.getElementById('lights');
    const ctx = canvas.getContext('2d');
    let width = 0;
    let height = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let blooms = [];
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function makeBloom(seedX, seedY, scale = 1) {
      return {
        x: seedX ?? random(0.12, 0.88) * width,
        y: seedY ?? random(0.15, 0.85) * height,
        radius: random(110, 260) * scale,
        baseRadius: random(110, 260) * scale,
        alpha: random(0.04, 0.11),
        driftX: random(-0.035, 0.035),
        driftY: random(-0.018, 0.018),
        phase: random(0, Math.PI * 2),
        speed: random(0.00045, 0.0012),
        hue: Math.round(random(220, 318)),
        sat: random(16, 32),
        light: random(62, 78)
      };
    }

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.max(7, Math.min(14, Math.round(width / 170)));
      blooms = Array.from({ length: count }, (_, i) => {
        if (i === 0) return makeBloom(width * 0.28, height * 0.36, 1.2);
        if (i === 1) return makeBloom(width * 0.7, height * 0.58, 1.15);
        if (i === 2) return makeBloom(width * 0.52, height * 0.22, 0.95);
        return makeBloom();
      });
    }

    function drawBackground(time) {
      const t = time * 0.00008;
      const gradient = ctx.createRadialGradient(
        width * (0.48 + Math.sin(t * 0.8) * 0.02),
        height * (0.44 + Math.cos(t * 0.6) * 0.02),
        width * 0.05,
        width * 0.5,
        height * 0.5,
        Math.max(width, height) * 0.7
      );
      gradient.addColorStop(0, 'rgba(24, 22, 42, 0.22)');
      gradient.addColorStop(0.45, 'rgba(13, 15, 29, 0.14)');
      gradient.addColorStop(1, 'rgba(8, 9, 18, 0.88)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    function drawBloom(bloom, time, index) {
      const pulse = Math.sin(time * bloom.speed + bloom.phase);
      const sway = Math.cos(time * bloom.speed * 0.72 + bloom.phase * 0.8);
      const x = bloom.x + pulse * width * bloom.driftX;
      const y = bloom.y + sway * height * bloom.driftY;
      const radius = bloom.baseRadius * (1 + pulse * 0.055);
      const alpha = bloom.alpha * (0.8 + (pulse + 1) * 0.15);

      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, `hsla(${bloom.hue}, ${bloom.sat}%, ${bloom.light}%, ${alpha})`);
      gradient.addColorStop(0.38, `hsla(${bloom.hue}, ${bloom.sat}%, ${bloom.light - 4}%, ${alpha * 0.55})`);
      gradient.addColorStop(1, `hsla(${bloom.hue}, ${bloom.sat}%, ${bloom.light - 10}%, 0)`);

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      if (index % 3 === 0) {
        ctx.strokeStyle = `hsla(${bloom.hue}, ${Math.max(10, bloom.sat - 8)}%, ${bloom.light}%, ${alpha * 0.08})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x, y, radius * 0.68, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function render(time) {
      ctx.clearRect(0, 0, width, height);
      drawBackground(time);
      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < blooms.length; i += 1) {
        drawBloom(blooms[i], time, i);
      }
      ctx.globalCompositeOperation = 'source-over';

      if (!reducedMotion) {
        requestAnimationFrame(render);
      }
    }

    resize();
    if (reducedMotion) {
      render(0);
    } else {
      requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
  </script>
</body>
</html>
